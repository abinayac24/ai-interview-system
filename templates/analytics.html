<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--ink:#09111f;
--blue:#2563eb;
--teal:#0f766e;
--mist:#f8fbff;
--line:#dbe3ef;
--muted:#64748b;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:"Segoe UI",Tahoma,sans-serif;
background:
radial-gradient(circle at 14% 12%, rgba(20,184,166,.16), transparent 18%),
radial-gradient(circle at 82% 10%, rgba(37,99,235,.18), transparent 17%),
linear-gradient(145deg,#08101d 0%, #10213f 42%, #183f7a 100%);
color:white;
min-height:100vh;
}

.shell{
max-width:1180px;
margin:0 auto;
padding:38px 18px 56px;
}

.top{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:16px;
flex-wrap:wrap;
padding:28px;
border-radius:28px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.14);
backdrop-filter:blur(12px);
box-shadow:0 24px 60px rgba(0,0,0,.28);
}

.top h1{
margin:0;
font-size:38px;
font-weight:800;
}

.top p{
margin:10px 0 0;
max-width:720px;
line-height:1.8;
color:#d8e6ff;
}

.navLinks{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.navLinks a{
text-decoration:none;
color:white;
padding:11px 15px;
border-radius:14px;
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.18);
font-weight:700;
font-size:14px;
}

.panel{
margin-top:22px;
background:#ffffff;
color:#1f2937;
border-radius:28px;
padding:26px;
box-shadow:0 24px 60px rgba(0,0,0,.22);
}

.panelHeader{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

.panelHeader h2{
margin:0;
font-size:26px;
font-weight:800;
}

.panelHeader p{
margin:8px 0 0;
color:var(--muted);
}

.chartWrap{
margin-top:24px;
padding:18px;
border-radius:22px;
background:var(--mist);
border:1px solid var(--line);
}

#chart{
width:100% !important;
height:420px !important;
}

#chartMessage{
margin-top:16px;
color:var(--muted);
text-align:center;
}
</style>

</head>

<body>

<div
class="shell"
id="analyticsData"
data-names='{{ names | tojson | safe }}'
data-scores='{{ scores | tojson | safe }}'
>
    <div class="top">
        <div>
            <h1>Interview Analytics</h1>
            <p>Track candidate score distribution and quickly review screening performance with a cleaner analytics view.</p>
        </div>
        <div class="navLinks">
            <a href="/dashboard">Dashboard</a>
            <a href="/">Home</a>
        </div>
    </div>

    <div class="panel">
        <div class="panelHeader">
            <div>
                <h2>Candidate Performance Chart</h2>
                <p>Score comparison across recorded interview attempts.</p>
            </div>
        </div>

        <div class="chartWrap">
            <canvas id="chart"></canvas>
            <p id="chartMessage"></p>
        </div>
    </div>
</div>

<script>
const analyticsData = document.getElementById("analyticsData");
const names = JSON.parse(analyticsData.dataset.names || "[]");
const scores = JSON.parse(analyticsData.dataset.scores || "[]");
const chartMessage = document.getElementById("chartMessage");

if (!names.length) {
  chartMessage.innerText = "No candidate data available yet.";
} else if (typeof Chart === "undefined") {
  chartMessage.innerText = "Chart library could not be loaded. Please refresh when internet access is available.";
} else {
  const ctx = document.getElementById("chart").getContext("2d");

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: names,
      datasets: [{
        label: "Interview Score",
        data: scores,
        borderRadius: 10,
        backgroundColor: [
          "rgba(37, 99, 235, 0.72)",
          "rgba(15, 118, 110, 0.72)",
          "rgba(249, 115, 22, 0.72)",
          "rgba(14, 165, 233, 0.72)",
          "rgba(99, 102, 241, 0.72)"
        ]
      }]
    },
    options: {
      plugins: {
        legend: {
          display: false
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 100,
          grid: {
            color: "rgba(148, 163, 184, 0.18)"
          }
        },
        x: {
          grid: {
            display: false
          }
        }
      }
    }
  });
}
</script>

</body>
</html>
